<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><title>帮助中心</title></head>
<body>
<h2>帮助中心</h2>
<p>欢迎使用用户管理系统！</p>
<h3>功能介绍</h3>
<ul>
    <li><strong>登录/注册：</strong>使用用户名和密码登录系统，新用户可注册账号。</li>
    <li><strong>搜索：</strong>通过用户名或邮箱搜索其他用户。</li>
    <li><strong>头像上传：</strong>在个人中心上传头像图片。</li>
    <li><strong>充值：</strong>在个人中心为账户充值余额。</li>
</ul>
<h3>常见问题</h3>
<p><strong>Q：如何修改密码？</strong><br>A：请联系管理员修改密码。</p>
<p><strong>Q：余额可以提现吗？</strong><br>A：目前不支持提现功能。</p>
<p><strong>Q：上传图片有什么限制？</strong><br>A：支持 JPG、PNG、GIF、WebP、BMP 格式，单文件最大 16MB。</p>
</body>
</html>
