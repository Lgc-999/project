{% extends "base.html" %}
{% block content %}
<div class="card">
    <h2>上传头像</h2>
    {% if error %}
        <div class="alert alert-error">{{ error }}</div>
    {% endif %}
    <form method="POST" action="/upload" enctype="multipart/form-data">
        <div class="form-group">
            <label for="file">选择文件</label>
            <input type="file" id="file" name="file" required>
        </div>
        <button type="submit" class="btn btn-primary">上传</button>
    </form>

    {% if success %}
        <div class="upload-result">
            <p style="color: #2e7d32; margin-top: 16px;">✅ 上传成功！</p>
            <img src="{{ url }}" alt="头像预览" style="max-width: 200px; margin: 12px 0; border-radius: 8px;">
            <p>文件链接：<a href="{{ url|e }}" target="_blank">{{ url|e }}</a></p>
        </div>
    {% endif %}
</div>
{% endblock %}
