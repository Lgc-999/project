{% extends "base.html" %}
{% block content %}
<div class="card">
    <h2>个人中心</h2>
    {% if error %}
        <div class="alert alert-error">{{ error }}</div>
    {% endif %}
    {% if user %}
        {% if user.avatar %}
            <div style="text-align: center; margin-bottom: 16px;">
                <img src="{{ user.avatar }}" alt="头像" style="width: 100px; height: 100px; border-radius: 50%; object-fit: cover; border: 3px solid #667eea;">
            </div>
        {% endif %}
        <ul class="info-list">
            <li><span class="label">ID：</span>{{ user.id }}</li>
            <li><span class="label">用户名：</span>{{ user.username }}</li>
            <li><span class="label">邮箱：</span>{{ user.email }}</li>
            <li><span class="label">手机：</span>{{ user.phone }}</li>
            <li><span class="label">余额：</span>{{ user.balance }}</li>
        </ul>

        <div style="border-top: 1px solid #e0e0e0; padding-top: 20px; margin-top: 20px;">
            <h3>充值</h3>
            <form method="POST" action="/recharge">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                <div class="form-group" style="display: flex; gap: 8px;">
                    <input type="number" name="amount" placeholder="输入充值金额" min="1" required style="flex: 1;">
                    <button type="submit" class="btn btn-primary">充值</button>
                </div>
            </form>
        </div>
    {% endif %}
</div>
{% endblock %}
