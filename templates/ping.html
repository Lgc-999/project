{% extends "base.html" %}
{% block content %}
<div class="card">
    <h2>Ping 网络诊断</h2>
    <form method="POST" action="/ping">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <div class="form-group" style="display: flex; gap: 8px;">
            <input type="text" name="ip" placeholder="输入 IP 地址或域名" value="{{ ip }}" style="flex: 1; font-family: Consolas, monospace;" required>
            <button type="submit" class="btn btn-primary">Ping</button>
        </div>
    </form>

    {% if result %}
        <div style="margin-top: 16px;">
            <pre style="background: #1a1a2e; color: #00ff41; font-family: Consolas, monospace; font-size: 13px; padding: 16px; border-radius: 4px; white-space: pre-wrap; word-break: break-all; min-height: 100px;">{{ result }}</pre>
        </div>
    {% endif %}
</div>
{% endblock %}
